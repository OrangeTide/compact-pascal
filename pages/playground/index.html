<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compact Pascal Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --fg: #2c2420;
      --border: #d4c9b8;
      --accent: #a0522d;
      --accent-hover: #8b4513;
      --tab-bg: #ebe5da;
      --tab-active: #fff;
      --menu-bg: #ebe5da;
      --modal-bg: #1e1e1e;
      --modal-fg: #d4d4d4;
      --mono: 'IBM Plex Mono', 'Consolas', 'Monaco', monospace;
      --sans: 'IBM Plex Sans Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
      --gutter-bg: #ebe5da;
      --gutter-fg: #999;
    }

    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
    }

    /* --- Top bar --- */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      background: var(--menu-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .top-bar-left { display: flex; align-items: center; gap: 1rem; }
    .top-bar .title {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
    .top-bar .title:hover { text-decoration: underline; }

    /* --- Menu bar --- */
    .menu-bar {
      display: flex;
      gap: 2px;
      padding: 0.35rem 1rem;
      background: var(--menu-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .menu-bar button, .menu-bar select {
      font-family: var(--sans);
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--tab-active);
      color: var(--fg);
      cursor: pointer;
    }
    .menu-bar button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .menu-bar select { cursor: pointer; }
    .menu-sep { width: 1px; background: var(--border); margin: 0 0.4rem; }

    /* --- Tab bar --- */
    .tab-bar {
      display: flex;
      background: var(--menu-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      border: none;
      border-right: 1px solid var(--border);
      background: var(--tab-bg);
      color: var(--fg);
      cursor: pointer;
      white-space: nowrap;
    }
    .tab:hover { background: var(--tab-active); }
    .tab.active { background: var(--tab-active); font-weight: 600; }
    .tab .close {
      font-size: 0.7rem;
      width: 1.2em;
      height: 1.2em;
      line-height: 1.2em;
      text-align: center;
      border-radius: 2px;
      color: #999;
    }
    .tab .close:hover { background: #ddd; color: #333; }
    .tab-new {
      padding: 0.4rem 0.7rem;
      font-size: 0.9rem;
      font-weight: bold;
      border: none;
      background: var(--tab-bg);
      color: var(--accent);
      cursor: pointer;
    }
    .tab-new:hover { background: var(--tab-active); }

    /* --- Editor area --- */
    .editor-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    .gutter {
      width: 3.5rem;
      background: var(--gutter-bg);
      border-right: 1px solid var(--border);
      padding: 0.5rem 0;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 0.85rem;
      line-height: 1.45;
      color: var(--gutter-fg);
      text-align: right;
      user-select: none;
      flex-shrink: 0;
    }
    .gutter-inner { padding-right: 0.5rem; white-space: pre; }
    #editor {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.85rem;
      line-height: 1.45;
      padding: 0.5rem;
      border: none;
      outline: none;
      resize: none;
      background: var(--tab-active);
      color: var(--fg);
      tab-size: 2;
      white-space: pre;
      overflow: auto;
    }

    /* --- Empty state background --- */
    .empty-state {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--tab-active);
      color: var(--gutter-fg);
      font-family: var(--mono);
      font-size: 0.9rem;
      text-align: center;
      user-select: none;
    }
    .empty-state img { opacity: 0.3; }
    .empty-state p { max-width: 300px; line-height: 1.6; }
    .editor-wrap.hidden, .editor-wrap.hidden + .empty-state { }
    body.no-tabs .editor-wrap { display: none; }
    body.no-tabs .empty-state { display: flex; }

    /* --- Status bar --- */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 0.25rem 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      background: var(--menu-bg);
      border-top: 1px solid var(--border);
      color: #666;
      flex-shrink: 0;
    }

    /* --- Console modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--modal-bg);
      color: var(--modal-fg);
      border-radius: 6px;
      width: min(90vw, 700px);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #444;
    }
    .modal-header h3 {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .modal-close {
      width: 1.8rem;
      height: 1.8rem;
      border: none;
      background: none;
      color: var(--modal-fg);
      font-size: 1.2rem;
      cursor: pointer;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: #444; }
    .modal-body {
      flex: 1;
      overflow: auto;
      padding: 1rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .modal-body .error { color: #f44; }
    .modal-body .info { color: #4af; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <a href="../" class="title">Compact Pascal</a>
    </div>
    <span style="font-size:0.8rem; color:#999;">Playground</span>
  </div>

  <!-- Menu bar -->
  <div class="menu-bar">
    <button onclick="doSave()" title="Save to browser storage">Save</button>
    <select id="loadSelect" onchange="doLoad(this)" title="Load sample program">
      <option value="">Load...</option>
    </select>
    <button onclick="doUpload()" title="Open file from disk">Upload</button>
    <button onclick="doDownload()" title="Download as .pas file">Download</button>
    <div class="menu-sep"></div>
    <button onclick="doCopy()" title="Copy to clipboard">Copy</button>
    <button onclick="doPaste()" title="Replace from clipboard">Paste</button>
    <div class="menu-sep"></div>
    <button onclick="doCompile()" title="Compile current buffer">Compile</button>
    <button onclick="doRun()" title="Compile and run">Run</button>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-new" onclick="newTab()" title="New buffer">+</button>
  </div>

  <!-- Editor -->
  <div class="editor-wrap">
    <div class="gutter"><div class="gutter-inner" id="gutter"></div></div>
    <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
  </div>

  <!-- Empty state (shown when all tabs are closed) -->
  <div class="empty-state">
    <img src="../logo/compact-pascal-icon-128.png" alt="" width="128" height="128">
    <p>No open buffers.<br>Click <strong>+</strong> to create one,<br>or load a sample program.</p>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="statusLeft">Ready</span>
    <span id="statusRight"></span>
  </div>

  <!-- Console modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Console</h3>
        <button class="modal-close" onclick="closeModal()" title="Close">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Hidden file input for upload -->
  <input type="file" id="fileInput" accept=".pas,.pp,.p,.txt" style="display:none" onchange="handleUpload(this)">

<script>
'use strict';

// --- Sample programs catalog ---
var SAMPLES = [
  { name: 'Hello World', file: 'hello.pas' },
  { name: 'FizzBuzz', file: 'fizzbuzz.pas' },
  { name: 'Fibonacci', file: 'fibonacci.pas' }
];

// --- Tab / buffer state ---
var buffers = [];      // { id, name, content, initContent, saved }
var activeTab = null;  // buffer id
var nextId = 1;

var editor = document.getElementById('editor');
var gutter = document.getElementById('gutter');
var tabBar = document.getElementById('tabBar');

// --- Initialize ---
(function init() {
  populateLoadMenu();
  restoreSession();
  if (buffers.length === 0) {
    newTab('hello.pas', "program hello;\nbegin\n  writeln('Hello, world!')\nend.\n");
  }
  editor.addEventListener('input', onEditorInput);
  editor.addEventListener('scroll', syncGutter);
  editor.addEventListener('keydown', onEditorKey);
  editor.addEventListener('click', updateCursorPos);
  editor.addEventListener('keyup', updateCursorPos);
  updateGutter();

  // Load compiler on page load
  initCompiler().catch(function(err) {
    console.error('Failed to load compiler:', err);
  });
})();

function populateLoadMenu() {
  var sel = document.getElementById('loadSelect');
  SAMPLES.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s.file;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
}

// --- Tab management ---
function newTab(name, content) {
  var id = nextId++;
  name = name || 'untitled.pas';
  content = content || "program untitled;\nbegin\n  \nend.\n";
  buffers.push({ id: id, name: name, content: content, initContent: content, saved: false });
  renderTabs();
  switchTab(id);
}

function isBufferModified(buf) {
  return buf.content !== buf.initContent;
}

function replaceBuffer(buf, name, content) {
  buf.name = name;
  buf.content = content;
  buf.initContent = content;
  buf.saved = false;
  if (buf.id === activeTab) {
    editor.value = content;
    updateGutter();
    updateCursorPos();
  }
  renderTabs();
}

function switchTab(id) {
  saveCurrentBuffer();
  activeTab = id;
  var buf = findBuffer(id);
  if (buf) {
    editor.value = buf.content;
    updateGutter();
    updateCursorPos();
    editor.focus();
  }
  renderTabs();
}

function closeTab(id, ev) {
  if (ev) { ev.stopPropagation(); }
  var idx = buffers.findIndex(function(b) { return b.id === id; });
  if (idx < 0) return;
  buffers.splice(idx, 1);
  if (buffers.length === 0) {
    activeTab = null;
    editor.value = '';
    updateEmptyState();
    renderTabs();
  } else if (activeTab === id) {
    var next = buffers[Math.min(idx, buffers.length - 1)];
    switchTab(next.id);
  } else {
    renderTabs();
  }
}

function updateEmptyState() {
  document.body.classList.toggle('no-tabs', buffers.length === 0);
}

function findBuffer(id) {
  return buffers.find(function(b) { return b.id === id; });
}

function saveCurrentBuffer() {
  var buf = findBuffer(activeTab);
  if (buf) buf.content = editor.value;
}

function renderTabs() {
  var newBtn = tabBar.querySelector('.tab-new');
  // remove old tabs
  Array.from(tabBar.querySelectorAll('.tab')).forEach(function(el) { el.remove(); });
  buffers.forEach(function(buf) {
    var tab = document.createElement('button');
    tab.className = 'tab' + (buf.id === activeTab ? ' active' : '');
    tab.onclick = function() { switchTab(buf.id); };

    var label = document.createElement('span');
    label.textContent = buf.name;
    tab.appendChild(label);

    var close = document.createElement('span');
    close.className = 'close';
    close.textContent = '\u00d7';
    close.onclick = function(ev) { closeTab(buf.id, ev); };
    tab.appendChild(close);

    tabBar.insertBefore(tab, newBtn);
  });
  updateEmptyState();
}

// --- Editor ---
function onEditorInput() {
  updateGutter();
  var buf = findBuffer(activeTab);
  if (buf) { buf.content = editor.value; buf.saved = false; }
}

function onEditorKey(ev) {
  if (ev.key === 'Tab') {
    ev.preventDefault();
    var start = editor.selectionStart;
    var end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    onEditorInput();
  }
}

function updateGutter() {
  var lines = editor.value.split('\n').length;
  var html = '';
  for (var i = 1; i <= lines; i++) html += i + '\n';
  gutter.textContent = html;
  syncGutter();
}

function syncGutter() {
  gutter.parentElement.scrollTop = editor.scrollTop;
  // sync the gutter inner offset
  gutter.style.transform = 'translateY(' + (-editor.scrollTop) + 'px)';
}

function updateCursorPos() {
  var val = editor.value;
  var pos = editor.selectionStart;
  var before = val.substring(0, pos);
  var line = before.split('\n').length;
  var col = pos - before.lastIndexOf('\n');
  document.getElementById('statusRight').textContent = 'Ln ' + line + ', Col ' + col;
}

// --- Menu actions ---
function doSave() {
  saveCurrentBuffer();
  var data = buffers.map(function(b) { return { name: b.name, content: b.content }; });
  try {
    localStorage.setItem('cpas-playground', JSON.stringify(data));
    localStorage.setItem('cpas-active', String(activeTab));
    var buf = findBuffer(activeTab);
    if (buf) buf.saved = true;
    setStatus('Saved to browser storage');
  } catch (e) {
    setStatus('Save failed: ' + e.message);
  }
}

function restoreSession() {
  try {
    var raw = localStorage.getItem('cpas-playground');
    if (!raw) return;
    var data = JSON.parse(raw);
    if (!Array.isArray(data) || data.length === 0) return;
    data.forEach(function(d) {
      var id = nextId++;
      buffers.push({ id: id, name: d.name, content: d.content, initContent: d.content, saved: true });
    });
    renderTabs();
    switchTab(buffers[0].id);
  } catch (e) {
    // ignore corrupt storage
  }
}

function doLoad(sel) {
  var file = sel.value;
  if (!file) return;
  sel.value = '';
  fetch('samples/' + file)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      saveCurrentBuffer();
      var buf = findBuffer(activeTab);
      if (buf && !isBufferModified(buf)) {
        replaceBuffer(buf, file, text);
      } else {
        newTab(file, text);
      }
      setStatus('Loaded ' + file);
    })
    .catch(function(e) {
      setStatus('Load failed: ' + e.message);
    });
}

function doUpload() {
  document.getElementById('fileInput').click();
}

function handleUpload(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() {
    newTab(file.name, reader.result);
    setStatus('Opened ' + file.name);
  };
  reader.readAsText(file);
  input.value = '';
}

function doDownload() {
  saveCurrentBuffer();
  var buf = findBuffer(activeTab);
  if (!buf) return;
  var blob = new Blob([buf.content], { type: 'text/plain' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = buf.name;
  a.click();
  URL.revokeObjectURL(url);
  setStatus('Downloaded ' + buf.name);
}

function doCopy() {
  var text = editor.value;
  if (editor.selectionStart !== editor.selectionEnd) {
    text = editor.value.substring(editor.selectionStart, editor.selectionEnd);
  }
  navigator.clipboard.writeText(text).then(function() {
    setStatus('Copied to clipboard');
  }).catch(function(e) {
    setStatus('Copy failed: ' + e.message);
  });
}

function doPaste() {
  navigator.clipboard.readText().then(function(text) {
    var start = editor.selectionStart;
    var end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + text.length;
    onEditorInput();
    setStatus('Pasted from clipboard');
  }).catch(function(e) {
    setStatus('Paste failed: ' + e.message);
  });
}

// --- Compiler and WASI ---
var compilerModule = null;
var compilerReady = false;

// WASI context for sandboxing
var WasiContext = {
  // File descriptor state
  fdState: {
    0: { data: null, pos: 0 },  // stdin
    1: { data: [], pos: 0 },    // stdout
    2: { data: [], pos: 0 }     // stderr
  },

  // Write to an fd
  fdWrite: function(fd, iovsPtr, iovsLen, nwrittenPtr, memory) {
    var written = 0;
    var view = new Uint8Array(memory.buffer);
    var dataView = new DataView(memory.buffer);

    for (var i = 0; i < iovsLen; i++) {
      var iovPtr = iovsPtr + (i * 8);
      var bufPtr = dataView.getUint32(iovPtr, true);
      var bufLen = dataView.getUint32(iovPtr + 4, true);

      var chunk = view.slice(bufPtr, bufPtr + bufLen);
      this.fdState[fd].data.push(...chunk);
      written += bufLen;
    }

    dataView.setUint32(nwrittenPtr, written, true);
    return 0;
  },

  // Read from an fd
  fdRead: function(fd, iovsPtr, iovsLen, nreadPtr, memory) {
    var nread = 0;
    var view = new Uint8Array(memory.buffer);
    var dataView = new DataView(memory.buffer);

    if (!this.fdState[fd].data) {
      dataView.setUint32(nreadPtr, 0, true);
      return 0;
    }

    var srcData = this.fdState[fd].data;
    var srcPos = this.fdState[fd].pos;

    for (var i = 0; i < iovsLen && srcPos < srcData.length; i++) {
      var iovPtr = iovsPtr + (i * 8);
      var bufPtr = dataView.getUint32(iovPtr, true);
      var bufLen = dataView.getUint32(iovPtr + 4, true);

      var toCopy = Math.min(bufLen, srcData.length - srcPos);
      for (var j = 0; j < toCopy; j++) {
        view[bufPtr + j] = srcData[srcPos + j];
      }

      srcPos += toCopy;
      nread += toCopy;

      if (toCopy < bufLen) break; // Not enough data
    }

    this.fdState[fd].pos = srcPos;
    dataView.setUint32(nreadPtr, nread, true);
    return 0;
  },

  // Reset for a new operation
  reset: function() {
    this.fdState[0].pos = 0;
    this.fdState[1].data = [];
    this.fdState[2].data = [];
  }
};

// Exception for proc_exit
function WasiExit(code) {
  this.code = code;
  this.message = 'WASI exit code ' + code;
}

// Load the compiler WASM module
function initCompiler() {
  if (compilerModule) {
    compilerReady = true;
    setStatus('Compiler ready');
    return Promise.resolve();
  }

  setStatus('Loading compiler...');

  return fetch('../snapshot/compiler.wasm')
    .then(function(response) {
      if (!response.ok) throw new Error('HTTP ' + response.status);
      return response.arrayBuffer();
    })
    .then(function(bytes) {
      var wasmImports = {
        wasi_snapshot_preview1: {
          fd_write: function(fd, iovs, iovs_len, nwritten) {
            var inst = compilerModule.instance;
            return WasiContext.fdWrite(fd, iovs, iovs_len, nwritten, inst.exports.memory);
          },
          fd_read: function(fd, iovs, iovs_len, nread) {
            var inst = compilerModule.instance;
            return WasiContext.fdRead(fd, iovs, iovs_len, nread, inst.exports.memory);
          },
          proc_exit: function(code) {
            throw new WasiExit(code);
          },
          args_get: function(argv, buf) {
            return 0; // No arguments
          },
          args_sizes_get: function(argc, buf_size) {
            var inst = compilerModule.instance;
            var dv = new DataView(inst.exports.memory.buffer);
            dv.setUint32(argc, 0, true);
            dv.setUint32(buf_size, 0, true);
            return 0;
          }
        }
      };

      return WebAssembly.instantiate(bytes, wasmImports);
    })
    .then(function(result) {
      compilerModule = result;
      compilerReady = true;
      setStatus('Compiler ready');
    })
    .catch(function(err) {
      // Fallback: try to use backend server (for development)
      setStatus('WASM compiler not available, trying development server...');
      return testBackendCompiler();
    });
}

// Test if a development server is available for compilation
function testBackendCompiler() {
  return fetch('/api/compile', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source: 'program test; begin end.' })
  })
  .then(function(response) {
    if (!response.ok) throw new Error('No backend');
    compilerMode = 'backend';
    compilerReady = true;
    setStatus('Using development server for compilation');
  })
  .catch(function(err) {
    compilerMode = 'unavailable';
    setStatus('Compiler unavailable (WASM snapshot not built yet)');
  });
}

var compilerMode = 'wasm'; // 'wasm', 'backend', or 'unavailable'

function doCompile() {
  saveCurrentBuffer();
  var buf = findBuffer(activeTab);
  if (!buf) {
    showModal('Compile Error', '<span class="error">No active buffer</span>');
    return;
  }

  if (compilerMode === 'unavailable') {
    showModal('Compiler Output',
      '<span class="error">Compiler unavailable</span>\n\n' +
      'The WASM snapshot has not been built yet.\n\n' +
      'The Compact Pascal compiler is under active development. ' +
      'When the compiler achieves self-hosting (can compile itself to WASM), ' +
      'the snapshot will be created and integrated into the playground.\n\n' +
      'Current compiler status:\n' +
      '- Can compile sample programs ✓\n' +
      '- Self-hosting not yet complete ✗\n\n' +
      'For development environment setup, see:\n' +
      'pages/playground/README.md'
    );
    setStatus('Compiler unavailable');
    return;
  }

  if (compilerMode === 'backend') {
    doCompileViaBackend(buf);
    return;
  }

  // WASM mode
  try {
    // Reset I/O for this compilation
    WasiContext.reset();
    WasiContext.fdState[0].data = new TextEncoder().encode(buf.content);

    // Call _start to run the compiler
    try {
      compilerModule.instance.exports._start();
    } catch (e) {
      if (!(e instanceof WasiExit)) throw e;
      // Normal exit via proc_exit
    }

    // Collect stderr (errors) and stdout (compiled WASM)
    var stderr = new TextDecoder().decode(new Uint8Array(WasiContext.fdState[2].data));
    var wasmBytes = new Uint8Array(WasiContext.fdState[1].data);

    if (stderr) {
      showModal('Compiler Output', '<span class="error">' + htmlEscape(stderr) + '</span>');
      setStatus('Compilation failed');
    } else if (wasmBytes.length === 0) {
      showModal('Compiler Output', '<span class="error">No output from compiler</span>');
      setStatus('Compilation failed');
    } else {
      showModal('Compiler Output',
        '<span class="info">Successfully compiled ' + wasmBytes.length + ' bytes of WASM</span>');
      setStatus('Compiled ' + wasmBytes.length + ' bytes');

      // Store compiled WASM for doRun
      buf.compiled = wasmBytes;
    }
  } catch (e) {
    showModal('Compiler Output',
      '<span class="error">Compiler error: ' + htmlEscape(e.message) + '</span>');
    setStatus('Compilation failed');
  }
}

function doCompileViaBackend(buf) {
  setStatus('Compiling...');
  fetch('/api/compile', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source: buf.content })
  })
  .then(function(response) {
    if (!response.ok) throw new Error('HTTP ' + response.status);
    return response.json();
  })
  .then(function(result) {
    if (result.error) {
      showModal('Compiler Output', '<span class="error">' + htmlEscape(result.error) + '</span>');
      setStatus('Compilation failed');
      return;
    }

    if (result.stderr) {
      showModal('Compiler Output', '<span class="error">' + htmlEscape(result.stderr) + '</span>');
      setStatus('Compilation failed');
      return;
    }

    if (!result.success) {
      showModal('Compiler Output', '<span class="error">Compilation failed</span>');
      setStatus('Compilation failed');
      return;
    }

    var wasmBytes = new Uint8Array(atob(result.wasm).split('').map(function(c) {
      return c.charCodeAt(0);
    }));

    showModal('Compiler Output',
      '<span class="info">Successfully compiled ' + wasmBytes.length + ' bytes of WASM</span>');
    setStatus('Compiled ' + wasmBytes.length + ' bytes');

    // Store compiled WASM for doRun
    buf.compiled = wasmBytes;
  })
  .catch(function(err) {
    showModal('Compiler Output',
      '<span class="error">Compilation error: ' + htmlEscape(err.message) + '</span>');
    setStatus('Compilation failed');
  });
}

function doRun() {
  saveCurrentBuffer();
  var buf = findBuffer(activeTab);
  if (!buf) {
    showModal('Program Output', '<span class="error">No active buffer</span>');
    return;
  }

  // First, compile if not already compiled
  if (!buf.compiled) {
    doCompile();
    // After compile, we should have buf.compiled if successful
    if (!buf.compiled) {
      return; // Compilation failed
    }
  }

  try {
    // Reset I/O for program execution
    WasiContext.reset();
    WasiContext.fdState[1].data = []; // Clear stdout
    WasiContext.fdState[2].data = []; // Clear stderr

    // Instantiate the compiled program
    var progImports = {
      wasi_snapshot_preview1: {
        fd_write: function(fd, iovs, iovs_len, nwritten) {
          var inst = progInstance;
          return WasiContext.fdWrite(fd, iovs, iovs_len, nwritten, inst.exports.memory);
        },
        fd_read: function(fd, iovs, iovs_len, nread) {
          var inst = progInstance;
          return WasiContext.fdRead(fd, iovs, iovs_len, nread, inst.exports.memory);
        },
        proc_exit: function(code) {
          throw new WasiExit(code);
        },
        args_get: function(argv, buf) { return 0; },
        args_sizes_get: function(argc, buf_size) {
          var inst = progInstance;
          var dv = new DataView(inst.exports.memory.buffer);
          dv.setUint32(argc, 0, true);
          dv.setUint32(buf_size, 0, true);
          return 0;
        }
      }
    };

    var progModule = new WebAssembly.Instance(
      new WebAssembly.Module(buf.compiled),
      progImports
    );
    var progInstance = progModule;

    // Run the program
    try {
      progModule.exports._start();
    } catch (e) {
      if (!(e instanceof WasiExit)) throw e;
    }

    // Show program output
    var stdout = new TextDecoder().decode(new Uint8Array(WasiContext.fdState[1].data));
    var stderr = new TextDecoder().decode(new Uint8Array(WasiContext.fdState[2].data));

    var output = '';
    if (stdout) {
      output += '<span class="info">Output:</span>\n' + htmlEscape(stdout);
    }
    if (stderr) {
      output += '\n<span class="error">Errors:</span>\n' + htmlEscape(stderr);
    }
    if (!stdout && !stderr) {
      output = '<span class="info">Program completed with no output</span>';
    }

    showModal('Program Output', output);
    setStatus('Program completed');
  } catch (e) {
    showModal('Program Output',
      '<span class="error">Runtime error: ' + htmlEscape(e.message) + '</span>');
    setStatus('Execution failed');
  }
}

function htmlEscape(str) {
  return str.replace(/[&<>"']/g, function(c) {
    var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    return map[c];
  });
}

// --- Modal ---
function showModal(title, html) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('visible');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
}

function closeModalOverlay(ev) {
  if (ev.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Escape') closeModal();
});

// --- Status ---
function setStatus(msg) {
  document.getElementById('statusLeft').textContent = msg;
}
</script>
