<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compact Pascal Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --fg: #2c2420;
      --border: #d4c9b8;
      --accent: #a0522d;
      --accent-hover: #8b4513;
      --tab-bg: #ebe5da;
      --tab-active: #fff;
      --menu-bg: #ebe5da;
      --output-bg: #1e1e1e;
      --output-fg: #d4d4d4;
      --mono: 'IBM Plex Mono', 'Consolas', 'Monaco', monospace;
      --sans: 'IBM Plex Sans Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
      --gutter-bg: #ebe5da;
      --gutter-fg: #999;
      --syn-comment: #6a9955;
      --syn-constant: #b5632f;
      --syn-keyword: #a0522d;
      --syn-type: #2e7d6e;
      --syn-operator: #2c2420;
      --syn-function: #6f4e37;
      --syn-entity: #6f4e37;
      --syn-attr: #2e7d6e;
      --syn-error: #dc3545;
      --syn-embedded: #6e5494;
    }

    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
    }

    /* --- Top bar --- */
    .top-bar {
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      background: var(--menu-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .top-bar .title {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }

    .top-bar .title:hover { text-decoration: underline; }

    .top-bar-buttons {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .top-bar button {
      font-family: var(--sans);
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--tab-active);
      color: var(--fg);
      cursor: pointer;
      white-space: nowrap;
    }

    .top-bar button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .top-bar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .top-bar-link {
      display: inline-flex;
      align-items: center;
      padding: 0.3rem 0.7rem;
      color: var(--fg);
      text-decoration: none;
    }

    .top-bar-link:hover {
      color: var(--accent);
    }

    .button-sep {
      width: 1px;
      height: 1.2rem;
      background: var(--border);
      margin: 0 0.2rem;
    }

    /* --- Tab bar --- */
    .tab-bar {
      display: flex;
      background: var(--menu-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      border: none;
      border-right: 1px solid var(--border);
      background: var(--tab-bg);
      color: var(--fg);
      cursor: pointer;
      white-space: nowrap;
    }

    .tab:hover { background: var(--tab-active); }
    .tab.active { background: var(--tab-active); font-weight: 600; }

    .tab .tab-menu {
      font-size: 0.7rem;
      width: 1.2em;
      height: 1.2em;
      line-height: 1.2em;
      text-align: center;
      border-radius: 2px;
      color: #999;
      cursor: pointer;
    }
    .tab .tab-menu:hover { background: #ddd; color: #333; }

    .tab .close {
      font-size: 0.7rem;
      width: 1.2em;
      height: 1.2em;
      line-height: 1.2em;
      text-align: center;
      border-radius: 2px;
      color: #999;
      cursor: pointer;
    }

    .tab .close:hover { background: #ddd; color: #333; }

    .tab-new {
      padding: 0.4rem 0.7rem;
      font-size: 0.9rem;
      font-weight: bold;
      border: none;
      background: var(--tab-bg);
      color: var(--accent);
      cursor: pointer;
    }

    .tab-new:hover { background: var(--tab-active); }

    .tab-context-menu {
      display: none;
      position: absolute;
      z-index: 100;
      background: var(--menu-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      min-width: 120px;
      padding: 0.2rem 0;
      font-family: var(--sans);
      font-size: 0.85rem;
    }
    .tab-context-menu.visible { display: block; }
    .tab-context-menu button {
      display: block;
      width: 100%;
      padding: 0.4rem 0.8rem;
      border: none;
      background: none;
      color: var(--fg);
      cursor: pointer;
      text-align: left;
      font-size: 0.85rem;
    }
    .tab-context-menu button:hover {
      background: var(--accent);
      color: #fff;
    }

    /* --- Content area: editor + output panes --- */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      gap: 0;
    }

    /* --- Editor pane --- */
    .editor-pane {
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .gutter {
      width: 3.5rem;
      background: var(--gutter-bg);
      border-right: 1px solid var(--border);
      padding: 0.5rem 0;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 0.85rem;
      line-height: 1.45;
      color: var(--gutter-fg);
      text-align: right;
      user-select: none;
      flex-shrink: 0;
    }

    .gutter-inner { padding-right: 0.5rem; white-space: pre; }

    #highlight {
      position: absolute;
      top: 0;
      left: 3.5rem;
      right: 0;
      bottom: 0;
      margin: 0;
      border: none;
      font-family: var(--mono);
      font-size: 0.85rem;
      line-height: 1.45;
      padding: 0.5rem;
      tab-size: 2;
      white-space: pre;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
      background: var(--tab-active);
      color: var(--fg);
    }

    #editor {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.85rem;
      line-height: 1.45;
      padding: 0.5rem;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: transparent;
      caret-color: var(--fg);
      tab-size: 2;
      white-space: pre;
      overflow: auto;
      position: relative;
      z-index: 2;
    }

    .syn-comment  { color: var(--syn-comment); }
    .syn-constant { color: var(--syn-constant); }
    .syn-keyword  { color: var(--syn-keyword); font-weight: 600; }
    .syn-type     { color: var(--syn-type); font-weight: 600; }
    .syn-operator { color: var(--syn-operator); font-weight: 600; }
    .syn-function { color: var(--syn-function); font-weight: 600; }
    .syn-embedded { color: var(--syn-embedded); font-style: italic; }
    .syn-entity   { color: var(--syn-entity); }
    .syn-attr     { color: var(--syn-attr); }
    .syn-error    { color: var(--syn-error); }

    /* --- Splitter --- */
    .splitter {
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      user-select: none;
    }

    .splitter:hover {
      background: var(--accent);
    }

    /* --- Output pane --- */
    .output-pane {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--output-bg);
      color: var(--output-fg);
      border-left: 1px solid var(--border);
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #444;
      flex-shrink: 0;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .output-header button {
      font-family: var(--sans);
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border: 1px solid #555;
      border-radius: 2px;
      background: #2a2a2a;
      color: var(--output-fg);
      cursor: pointer;
    }

    .output-header button:hover {
      background: #3a3a3a;
      border-color: #666;
    }

    #output {
      flex: 1;
      overflow: auto;
      padding: 0.5rem 1rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .out-info {
      color: #4af;
    }

    .out-error {
      color: #f44;
    }

    .out-stdout {
      color: var(--output-fg);
    }

    .out-stderr {
      color: #ff8844;
    }

    /* --- Status bar --- */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 0.25rem 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      background: var(--menu-bg);
      border-top: 1px solid var(--border);
      color: #666;
      flex-shrink: 0;
    }

    /* --- Empty state --- */
    .empty-state {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--tab-active);
      color: var(--gutter-fg);
      font-family: var(--mono);
      font-size: 0.9rem;
      text-align: center;
      user-select: none;
    }

    body.no-tabs .editor-wrap { display: none; }
    body.no-tabs .empty-state { display: flex; }

    /* --- File picker modal --- */
    .file-picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .file-picker-overlay.visible {
      display: flex;
    }

    .file-picker {
      background: var(--modal-bg);
      color: var(--output-fg);
      border-radius: 6px;
      width: min(90vw, 400px);
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      background: var(--output-bg);
    }

    .file-picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #444;
    }

    .file-picker-header h3 {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .file-picker-close {
      width: 1.8rem;
      height: 1.8rem;
      border: none;
      background: none;
      color: var(--output-fg);
      font-size: 1.2rem;
      cursor: pointer;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .file-picker-close:hover { background: #444; }

    .file-picker-list {
      flex: 1;
      overflow: auto;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .file-picker-item {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #333;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.8rem;
    }

    .file-picker-item:hover {
      background: #2a2a2a;
    }

    .file-picker-name {
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .file-picker-desc {
      font-size: 0.7rem;
      color: #999;
    }

    /* --- Dark mode --- */
    body.dark {
      --bg: #1a1a1a;
      --fg: #d4d4d4;
      --border: #444;
      --accent: #d4845a;
      --accent-hover: #c0714a;
      --tab-bg: #252525;
      --tab-active: #2d2d2d;
      --menu-bg: #222;
      --output-bg: #111;
      --output-fg: #d4d4d4;
      --gutter-bg: #252525;
      --gutter-fg: #666;
      --syn-comment: #6a9955;
      --syn-constant: #ce9178;
      --syn-keyword: #d4845a;
      --syn-type: #4ec9b0;
      --syn-operator: #d4d4d4;
      --syn-function: #dcdcaa;
      --syn-entity: #dcdcaa;
      --syn-attr: #4ec9b0;
      --syn-error: #f44747;
      --syn-embedded: #b8a2d0;
    }

    body.dark .top-bar button {
      background: #333;
      color: #d4d4d4;
      border-color: #555;
    }

    body.dark .top-bar button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    body.dark .top-bar button:disabled {
      opacity: 0.4;
    }

    body.dark .tab .tab-menu { color: #666; }
    body.dark .tab .tab-menu:hover { background: #444; color: #ccc; }
    body.dark .tab .close { color: #666; }
    body.dark .tab .close:hover { background: #444; color: #ccc; }

    body.dark .output-header button {
      background: #1a1a1a;
      border-color: #444;
    }

    body.dark .output-header button:hover {
      background: #2a2a2a;
    }

    body.dark .tab-context-menu {
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    body.dark .tab-context-menu button:hover {
      background: var(--accent);
    }

    body.dark .file-picker-item:hover { background: #222; }

    /* --- Responsive: stack on narrow screens --- */
    @media (max-width: 700px) {
      .content-area {
        flex-direction: column;
      }

      .editor-pane {
        flex: 0 0 50%;
      }

      .output-pane {
        flex: 0 0 50%;
        border-left: none;
        border-top: 1px solid var(--border);
      }

      .splitter {
        width: 100%;
        height: 5px;
        cursor: row-resize;
      }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <a href="../" class="title" onclick="return confirmLeave()">Compact Pascal</a>
    </div>
    <div class="top-bar-buttons">
      <button id="openBtn" onclick="showFilePicker()" title="Open sample program">&#x1F4C2; Open Sample</button>
      <button onclick="doUpload()" title="Upload .pas file">&#x1F4E4; Upload</button>
      <button onclick="doDownload()" title="Download current buffer">&#x1F4E5; Download</button>
      <div class="button-sep"></div>
      <button id="compileBtn" onclick="doCompile()" title="Compile (Ctrl+S)">&#x1F527; Compile</button>
      <button id="runBtn" onclick="doRun()" title="Run (Ctrl+Enter)" style="color:#228b22">&#x25B6;&#xFE0F; Run</button>
      <button id="stopBtn" onclick="doStop()" title="Stop program" disabled style="color:#cc3333">&#x23F9;&#xFE0F; Stop</button>
    </div>
    <div style="margin-left:auto">
      <a href="https://github.com/OrangeTide/compact-pascal" target="_blank" rel="noopener" class="top-bar-link" title="Source on GitHub"><svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
      <button onclick="toggleDarkMode()" id="darkModeBtn" title="Toggle dark mode">&#x1F319; Dark</button>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-new" onclick="newTab()" title="New buffer">+</button>
  </div>
  <div class="tab-context-menu" id="tabContextMenu">
    <button onclick="doRenameTab()">Rename</button>
    <button onclick="doDuplicateTab()">Duplicate</button>
    <button onclick="doSaveTab()">Save</button>
    <button onclick="doDeleteTab()">Delete</button>
  </div>

  <!-- Content area: editor + output -->
  <div class="content-area">
    <!-- Editor pane -->
    <div class="editor-pane">
      <div class="editor-wrap">
        <div class="gutter"><div class="gutter-inner" id="gutter"></div></div>
        <pre id="highlight" aria-hidden="true"></pre>
        <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
      </div>
      <div class="empty-state">
        <p>No open buffers.<br>Click <strong>+</strong> to create one,<br>or click <strong>Open Sample</strong> to load an example.</p>
      </div>
    </div>

    <!-- Splitter -->
    <div class="splitter" id="splitter"></div>

    <!-- Output pane -->
    <div class="output-pane">
      <div class="output-header">
        <span>Output</span>
        <button onclick="clearOutput()" title="Clear output">Clear</button>
      </div>
      <pre id="output"></pre>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="statusLeft">Ready</span>
    <span id="statusRight"></span>
  </div>

  <!-- File picker modal -->
  <div class="file-picker-overlay" id="filePickerOverlay" onclick="closeFilePickerOnBg(event)">
    <div class="file-picker">
      <div class="file-picker-header">
        <h3>Open Sample</h3>
        <button class="file-picker-close" onclick="closeFilePicker()" title="Close">&times;</button>
      </div>
      <ul class="file-picker-list" id="filePickerList"></ul>
    </div>
  </div>

  <!-- Hidden file input for upload -->
  <input type="file" id="fileInput" accept=".pas,.pp,.p,.txt,.html,.htm,.xml" style="display:none" onchange="handleUpload(this)">

<script>
'use strict';

// --- Tab / buffer state ---
var buffers = [];      // { id, name, content, initContent, compiled }
var activeTab = null;  // buffer id
var nextId = 1;
var runningWorker = null;

var editor = document.getElementById('editor');
var gutter = document.getElementById('gutter');
var highlight = document.getElementById('highlight');
var tabBar = document.getElementById('tabBar');
var output = document.getElementById('output');

// --- Syntax highlighting ---
var syntaxDefs = {};     // extension -> normalized syntax def (e.g. 'pas', 'html', 'xml')
var charClassCache = {};

var extToSyntaxFile = {
  'pas': 'pascal.json', 'pp': 'pascal.json', 'p': 'pascal.json',
  'html': 'html.json', 'htm': 'html.json',
  'xml': 'xml.json'
};

function fileExt(name) {
  var dot = name.lastIndexOf('.');
  return dot >= 0 ? name.slice(dot + 1).toLowerCase() : '';
}

function syntaxForFile(name) {
  var ext = fileExt(name);
  return syntaxDefs[ext] || null;
}

function matchCharClass(ch, classStr) {
  if (classStr === '\n') return ch === '\n';
  var fn = charClassCache[classStr];
  if (!fn) {
    // Build a test function from the class string
    // Ranges like "a-zA-Z0-9" and single chars like "(" "{" "*" "+"
    var parts = [];
    var i = 0;
    while (i < classStr.length) {
      if (i + 2 < classStr.length && classStr[i + 1] === '-') {
        parts.push(classStr[i] + '-' + classStr[i + 2]);
        i += 3;
      } else {
        // Escape regex-special characters
        var c = classStr[i];
        parts.push(c.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
        i++;
      }
    }
    var re = new RegExp('^[' + parts.join('') + ']$');
    fn = function(c) { return re.test(c); };
    charClassCache[classStr] = fn;
  }
  return fn(ch);
}

function normalizeSyntax(def) {
  var states = def.states;
  for (var name in states) {
    var st = states[name];
    if (st.style === undefined) st.style = (name in def.styles) ? name : 'idle';
    if (!st.rules) st.rules = [];
    if (st.default && typeof st.default === 'object') {
      var d = st.default;
      if (d.noeat) st.defaultNoeat = true;
      if (d.recolor) st.defaultRecolor = d.recolor;
      st.default = d.next;
    }
    if (st.strings) {
      for (var key in st.strings) {
        if (typeof st.strings[key] === 'string') st.strings[key] = { next: st.strings[key] };
      }
    }
  }
  return def;
}

function tokenize(text, def) {
  var states = def.states;
  var styleMap = def.styles;
  var styles = new Array(text.length);
  var state = def.startState;
  var pos = 0;
  var bufStart = -1;

  while (pos < text.length) {
    var ch = text[pos];
    var st = states[state];
    var rule = null;

    // Find matching rule
    for (var r = 0; r < st.rules.length; r++) {
      if (matchCharClass(ch, st.rules[r].match)) {
        rule = st.rules[r];
        break;
      }
    }

    if (rule) {
      var nextState = rule.next;
      var targetStyle = states[nextState].style;

      // Buffer start for keyword tracking
      if (rule.buffer) bufStart = pos;

      // Assign current char's style first
      styles[pos] = st.style;

      // Recolor: repaint previous N chars with target state's style (overwrites above)
      if (rule.recolor) {
        for (var k = Math.max(0, pos - rule.recolor + 1); k <= pos; k++) {
          styles[k] = targetStyle;
        }
      }

      if (rule.noeat) {
        state = nextState;
        // don't advance pos
      } else {
        state = nextState;
        pos++;
      }
    } else {
      // Default transition
      styles[pos] = st.style;

      if (st.defaultRecolor) {
        var drs = states[st.default].style;
        for (var k = Math.max(0, pos - st.defaultRecolor + 1); k <= pos; k++) styles[k] = drs;
      }

      if (st.defaultNoeat) {
        // Keyword lookup when leaving via default
        var kwNext = null;
        if (st.keywords && bufStart >= 0) {
          var word = text.slice(bufStart, pos).toLowerCase();
          var kwStyle = st.keywords[word] || 'idle';
          for (var k = bufStart; k < pos; k++) styles[k] = kwStyle;
          if (st.keywordNext) kwNext = st.keywordNext[word];
          bufStart = -1;
        }
        state = kwNext || st.default;
      } else {
        // Multi-char string matching
        if (st.strings && bufStart >= 0) {
          var buf = text.slice(bufStart, pos + 1);
          var sm = st.strings[buf];
          if (sm) {
            var sms = states[sm.next].style;
            if (sm.recolor) {
              for (var k = Math.max(0, pos - sm.recolor + 1); k <= pos; k++) styles[k] = sms;
            }
            state = sm.next;
            bufStart = -1;
            pos++;
            continue;
          }
        }
        state = st.default;
        pos++;
      }
    }
  }

  // Handle EOF inside ident
  if (bufStart >= 0) {
    var identState = states['ident'];
    if (identState && identState.keywords) {
      var word = text.slice(bufStart, text.length).toLowerCase();
      var kwStyle = identState.keywords[word] || 'idle';
      for (var k = bufStart; k < text.length; k++) styles[k] = kwStyle;
    }
  }

  return styles;
}

function renderHighlight(text, styles, def) {
  if (!text) return '\n';
  var styleMap = def.styles;
  var parts = [];
  var runStyle = styles[0] || 'idle';
  var runStart = 0;

  for (var i = 1; i <= text.length; i++) {
    var s = (i < text.length) ? (styles[i] || 'idle') : null;
    if (s !== runStyle) {
      var chunk = text.slice(runStart, i);
      // HTML-escape
      chunk = chunk.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      var cls = styleMap[runStyle];
      if (cls) {
        parts.push('<span class="' + cls + '">' + chunk + '</span>');
      } else {
        parts.push(chunk);
      }
      runStyle = s;
      runStart = i;
    }
  }

  // Ensure trailing newline so pre height matches textarea
  var result = parts.join('');
  if (result[result.length - 1] !== '\n') result += '\n';
  return result;
}

function updateHighlight() {
  var text = editor.value;
  var buf = findBuffer(activeTab);
  var def = buf ? syntaxForFile(buf.name) : null;
  if (def) {
    var styles = tokenize(text, def);
    highlight.innerHTML = renderHighlight(text, styles, def);
  } else {
    // No syntax def — show plain text so editor is readable
    highlight.textContent = text || '\n';
  }
  syncHighlight();
}

function syncHighlight() {
  highlight.scrollTop = editor.scrollTop;
  highlight.scrollLeft = editor.scrollLeft;
}

// --- Initialize ---
(function init() {
  restoreSession();
  if (buffers.length === 0) {
    newTab('hello.pas', "program hello;\nbegin\n  writeln('Hello, world!')\nend.\n");
  }
  editor.addEventListener('input', onEditorInput);
  editor.addEventListener('scroll', function() { syncGutter(); syncHighlight(); });
  editor.addEventListener('keydown', onEditorKey);
  editor.addEventListener('click', updateCursorPos);
  editor.addEventListener('keyup', updateCursorPos);
  updateGutter();
  updateHighlight();

  // Load syntax definitions
  var syntaxFiles = {};
  Object.keys(extToSyntaxFile).forEach(function(ext) { syntaxFiles[extToSyntaxFile[ext]] = true; });
  Object.keys(syntaxFiles).forEach(function(file) {
    fetch('syntax/' + file)
      .then(function(r) { return r.json(); })
      .then(function(def) {
        var norm = normalizeSyntax(def);
        Object.keys(extToSyntaxFile).forEach(function(ext) {
          if (extToSyntaxFile[ext] === file) syntaxDefs[ext] = norm;
        });
        updateHighlight();
      })
      .catch(function(e) { console.warn('Syntax ' + file + ' unavailable:', e); });
  });

  // Load compiler on page load
  initCompiler().catch(function(err) {
    console.error('Failed to load compiler:', err);
  });

  // Setup splitter
  setupSplitter();

  // Fetch file catalog
  fetchFileCatalog();
})();

// --- Splitter ---
var splitterActive = false;
var splitStart = 0;
var splitStart1 = 0;
var splitStart2 = 0;

function setupSplitter() {
  var splitter = document.getElementById('splitter');
  var contentArea = document.querySelector('.content-area');
  var editorPane = document.querySelector('.editor-pane');
  var outputPane = document.querySelector('.output-pane');

  var isVertical = contentArea.style.flexDirection !== 'column';

  splitter.addEventListener('mousedown', function(ev) {
    ev.preventDefault();
    splitterActive = true;
    splitStart = isVertical ? ev.clientX : ev.clientY;

    if (isVertical) {
      splitStart1 = editorPane.offsetWidth;
      splitStart2 = outputPane.offsetWidth;
    } else {
      splitStart1 = editorPane.offsetHeight;
      splitStart2 = outputPane.offsetHeight;
    }

    document.addEventListener('mousemove', onSplitterMove);
    document.addEventListener('mouseup', onSplitterUp);
  });

  function onSplitterMove(ev) {
    if (!splitterActive) return;

    if (isVertical) {
      var delta = ev.clientX - splitStart;
      var newWidth1 = splitStart1 + delta;
      var newWidth2 = splitStart2 - delta;
      if (newWidth1 > 200 && newWidth2 > 150) {
        var total = newWidth1 + newWidth2;
        editorPane.style.flex = '0 0 ' + (newWidth1 / (total) * 100) + '%';
        outputPane.style.flex = '0 0 ' + (newWidth2 / (total) * 100) + '%';
      }
    } else {
      var delta = ev.clientY - splitStart;
      var newHeight1 = splitStart1 + delta;
      var newHeight2 = splitStart2 - delta;
      if (newHeight1 > 100 && newHeight2 > 100) {
        var total = newHeight1 + newHeight2;
        editorPane.style.flex = '0 0 ' + (newHeight1 / (total) * 100) + '%';
        outputPane.style.flex = '0 0 ' + (newHeight2 / (total) * 100) + '%';
      }
    }
  }

  function onSplitterUp(ev) {
    if (!splitterActive) return;
    splitterActive = false;
    document.removeEventListener('mousemove', onSplitterMove);
    document.removeEventListener('mouseup', onSplitterUp);
  }
}

// --- Tab management ---
function newTab(name, content) {
  var id = nextId++;
  name = name || 'untitled.pas';
  content = content || "program untitled;\nbegin\n  \nend.\n";
  buffers.push({ id: id, name: name, content: content, initContent: content, compiled: null });
  renderTabs();
  switchTab(id);
}

function isBufferModified(buf) {
  return buf.content !== buf.initContent;
}

function replaceBuffer(buf, name, content) {
  buf.name = name;
  buf.content = content;
  buf.initContent = content;
  buf.compiled = null;
  if (buf.id === activeTab) {
    editor.value = content;
    updateGutter();
    updateHighlight();
    updateCursorPos();
  }
  renderTabs();
}

function switchTab(id) {
  saveCurrentBuffer();
  activeTab = id;
  var buf = findBuffer(id);
  if (buf) {
    editor.value = buf.content;
    updateGutter();
    updateHighlight();
    updateCursorPos();
    editor.focus();
  }
  renderTabs();
}

function closeTab(id, ev) {
  if (ev) { ev.stopPropagation(); }
  var idx = buffers.findIndex(function(b) { return b.id === id; });
  if (idx < 0) return;
  buffers.splice(idx, 1);
  if (buffers.length === 0) {
    activeTab = null;
    editor.value = '';
    updateEmptyState();
    renderTabs();
  } else if (activeTab === id) {
    var next = buffers[Math.min(idx, buffers.length - 1)];
    switchTab(next.id);
  } else {
    renderTabs();
  }
}

function updateEmptyState() {
  document.body.classList.toggle('no-tabs', buffers.length === 0);
}

function findBuffer(id) {
  return buffers.find(function(b) { return b.id === id; });
}

function saveCurrentBuffer() {
  var buf = findBuffer(activeTab);
  if (buf) buf.content = editor.value;
}

function renderTabs() {
  var newBtn = tabBar.querySelector('.tab-new');
  // remove old tabs
  Array.from(tabBar.querySelectorAll('.tab')).forEach(function(el) { el.remove(); });
  buffers.forEach(function(buf) {
    var tab = document.createElement('button');
    tab.className = 'tab' + (buf.id === activeTab ? ' active' : '');
    tab.onclick = function() { switchTab(buf.id); };

    var label = document.createElement('span');
    label.textContent = (isBufferModified(buf) ? '\u2022 ' : '') + buf.name;
    tab.appendChild(label);

    var menu = document.createElement('span');
    menu.className = 'tab-menu';
    menu.textContent = '\u25BE';
    menu.onclick = function(ev) { ev.stopPropagation(); showTabContextMenu(ev, buf.id); };
    tab.appendChild(menu);

    var close = document.createElement('span');
    close.className = 'close';
    close.textContent = '\u00d7';
    close.onclick = function(ev) { closeTab(buf.id, ev); };
    tab.appendChild(close);

    tabBar.insertBefore(tab, newBtn);
  });
  updateEmptyState();
}

// --- Tab context menu ---
var contextMenuTabId = null;
var tabContextMenu = document.getElementById('tabContextMenu');

function showTabContextMenu(ev, id) {
  contextMenuTabId = id;
  var rect = ev.target.getBoundingClientRect();
  tabContextMenu.style.left = rect.left + 'px';
  tabContextMenu.style.top = (rect.bottom + 2) + 'px';
  tabContextMenu.classList.add('visible');
}

function hideTabContextMenu() {
  tabContextMenu.classList.remove('visible');
  contextMenuTabId = null;
}

document.addEventListener('click', function(ev) {
  if (!tabContextMenu.contains(ev.target)) hideTabContextMenu();
});

function doRenameTab() {
  hideTabContextMenu();
  var buf = findBuffer(contextMenuTabId || activeTab);
  if (!buf) return;
  var name = prompt('Rename file:', buf.name);
  if (name && name !== buf.name) {
    buf.name = name;
    if (buf.id === activeTab) updateHighlight();
    renderTabs();
  }
}

function doDuplicateTab() {
  hideTabContextMenu();
  var buf = findBuffer(contextMenuTabId || activeTab);
  if (!buf) return;
  saveCurrentBuffer();
  var ext = fileExt(buf.name);
  var base = ext ? buf.name.slice(0, buf.name.length - ext.length - 1) : buf.name;
  var copyName = base + ' (copy)' + (ext ? '.' + ext : '');
  newTab(copyName, buf.content);
}

function doSaveTab() {
  hideTabContextMenu();
  doSave();
}

function doDeleteTab() {
  hideTabContextMenu();
  var id = contextMenuTabId || activeTab;
  var buf = findBuffer(id);
  if (!buf) return;
  if (!confirm('Delete "' + buf.name + '" from browser storage?')) return;
  closeTab(id);
  doSave();
}

// --- Editor ---
function onEditorInput() {
  updateGutter();
  updateHighlight();
  var buf = findBuffer(activeTab);
  if (buf) {
    buf.content = editor.value;
    updateTabLabel(buf);
  }
}

function updateTabLabel(buf) {
  var tabs = tabBar.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    if (buffers[i] && buffers[i].id === buf.id) {
      tabs[i].querySelector('span').textContent = (isBufferModified(buf) ? '\u2022 ' : '') + buf.name;
      break;
    }
  }
}

function onEditorKey(ev) {
  if (ev.key === 'Tab') {
    ev.preventDefault();
    var start = editor.selectionStart;
    var end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    onEditorInput();
  } else if ((ev.ctrlKey || ev.metaKey) && ev.key === 's') {
    ev.preventDefault();
    doSave();
  } else if ((ev.ctrlKey || ev.metaKey) && ev.key === 'Enter') {
    ev.preventDefault();
    doCompile();
    doRun();
  }
}

function updateGutter() {
  var lines = editor.value.split('\n').length;
  var html = '';
  for (var i = 1; i <= lines; i++) html += i + '\n';
  gutter.textContent = html;
  syncGutter();
}

function syncGutter() {
  gutter.parentElement.scrollTop = editor.scrollTop;
  gutter.style.transform = 'translateY(' + (-editor.scrollTop) + 'px)';
}

function updateCursorPos() {
  var val = editor.value;
  var pos = editor.selectionStart;
  var before = val.substring(0, pos);
  var line = before.split('\n').length;
  var col = pos - before.lastIndexOf('\n');
  document.getElementById('statusRight').textContent = 'Ln ' + line + ', Col ' + col;
}

// --- File picker ---
var fileCatalog = [];

function fetchFileCatalog() {
  fetch('files.json')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      fileCatalog = data || [];
    })
    .catch(function(err) {
      console.error('Failed to load file catalog:', err);
    });
}

function showFilePicker() {
  var list = document.getElementById('filePickerList');
  list.innerHTML = '';
  fileCatalog.forEach(function(entry) {
    var li = document.createElement('li');
    li.className = 'file-picker-item';
    li.innerHTML =
      '<div class="file-picker-name">' + htmlEscape(entry.name) + '</div>' +
      '<div class="file-picker-desc">' + htmlEscape(entry.description) + '</div>';
    li.onclick = function() {
      openSampleFile(entry.file, entry.name);
    };
    list.appendChild(li);
  });
  document.getElementById('filePickerOverlay').classList.add('visible');
}

function closeFilePicker() {
  document.getElementById('filePickerOverlay').classList.remove('visible');
}

function closeFilePickerOnBg(ev) {
  if (ev.target === document.getElementById('filePickerOverlay')) {
    closeFilePicker();
  }
}

function openSampleFile(file, displayName) {
  closeFilePicker();
  setStatus('Loading ' + file + '...');
  fetch('samples/' + file)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      saveCurrentBuffer();
      var buf = findBuffer(activeTab);
      // Only replace if the current tab is unmodified AND was not restored from localStorage
      if (buf && !isBufferModified(buf) && !buf.fromStorage) {
        replaceBuffer(buf, file, text);
      } else {
        newTab(file, text);
      }
      clearOutput();
      setStatus('Loaded ' + displayName);
    })
    .catch(function(e) {
      setStatus('Load failed: ' + e.message);
    });
}

function doUpload() {
  document.getElementById('fileInput').click();
}

function handleUpload(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() {
    newTab(file.name, reader.result);
    clearOutput();
    setStatus('Opened ' + file.name);
  };
  reader.readAsText(file);
  input.value = '';
}

function doDownload() {
  saveCurrentBuffer();
  var buf = findBuffer(activeTab);
  if (!buf) return;
  var blob = new Blob([buf.content], { type: 'text/plain' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = buf.name;
  a.click();
  URL.revokeObjectURL(url);
  setStatus('Downloaded ' + buf.name);
}

function doSave() {
  saveCurrentBuffer();
  var data = buffers.map(function(b) { return { name: b.name, content: b.content }; });
  try {
    localStorage.setItem('cpas-playground', JSON.stringify(data));
    localStorage.setItem('cpas-active', String(activeTab));
    setStatus('Saved to browser storage');
  } catch (e) {
    setStatus('Save failed: ' + e.message);
  }
}

function restoreSession() {
  try {
    var raw = localStorage.getItem('cpas-playground');
    if (!raw) return;
    var data = JSON.parse(raw);
    if (!Array.isArray(data) || data.length === 0) return;
    data.forEach(function(d) {
      var id = nextId++;
      buffers.push({ id: id, name: d.name, content: d.content, initContent: d.content, compiled: null, fromStorage: true });
    });
    renderTabs();
    switchTab(buffers[0].id);
  } catch (e) {
    // ignore corrupt storage
  }
}

// --- Compiler and WASI ---
var compilerModule = null;
var compilerReady = false;

// WASI context for sandboxing
var WasiContext = {
  fdState: {
    0: { data: null, pos: 0 },  // stdin
    1: { data: [], pos: 0 },    // stdout
    2: { data: [], pos: 0 }     // stderr
  },

  fdWrite: function(fd, iovsPtr, iovsLen, nwrittenPtr, memory) {
    var written = 0;
    var view = new Uint8Array(memory.buffer);
    var dataView = new DataView(memory.buffer);

    for (var i = 0; i < iovsLen; i++) {
      var iovPtr = iovsPtr + (i * 8);
      var bufPtr = dataView.getUint32(iovPtr, true);
      var bufLen = dataView.getUint32(iovPtr + 4, true);

      var chunk = view.slice(bufPtr, bufPtr + bufLen);
      this.fdState[fd].data.push(...chunk);
      written += bufLen;
    }

    dataView.setUint32(nwrittenPtr, written, true);
    return 0;
  },

  fdRead: function(fd, iovsPtr, iovsLen, nreadPtr, memory) {
    var nread = 0;
    var view = new Uint8Array(memory.buffer);
    var dataView = new DataView(memory.buffer);

    if (!this.fdState[fd].data) {
      dataView.setUint32(nreadPtr, 0, true);
      return 0;
    }

    var srcData = this.fdState[fd].data;
    var srcPos = this.fdState[fd].pos;

    for (var i = 0; i < iovsLen && srcPos < srcData.length; i++) {
      var iovPtr = iovsPtr + (i * 8);
      var bufPtr = dataView.getUint32(iovPtr, true);
      var bufLen = dataView.getUint32(iovPtr + 4, true);

      var toCopy = Math.min(bufLen, srcData.length - srcPos);
      for (var j = 0; j < toCopy; j++) {
        view[bufPtr + j] = srcData[srcPos + j];
      }

      srcPos += toCopy;
      nread += toCopy;

      if (toCopy < bufLen) break;
    }

    this.fdState[fd].pos = srcPos;
    dataView.setUint32(nreadPtr, nread, true);
    return 0;
  },

  reset: function() {
    this.fdState[0].pos = 0;
    this.fdState[1].data = [];
    this.fdState[2].data = [];
  }
};

function WasiExit(code) {
  this.code = code;
  this.message = 'WASI exit code ' + code;
}

function initCompiler() {
  if (compilerModule) {
    compilerReady = true;
    return Promise.resolve();
  }

  setStatus('Loading compiler...');

  var compilerUrl = window.CPAS_COMPILER_URL || 'compiler.wasm';

  return fetch(compilerUrl)
    .then(function(response) {
      if (!response.ok) throw new Error('HTTP ' + response.status);
      return response.arrayBuffer();
    })
    .then(function(bytes) {
      var currentInstance = null;

      var wasmImports = {
        wasi_snapshot_preview1: {
          fd_write: function(fd, iovs, iovs_len, nwritten) {
            return WasiContext.fdWrite(fd, iovs, iovs_len, nwritten, currentInstance.exports.memory);
          },
          fd_read: function(fd, iovs, iovs_len, nread) {
            return WasiContext.fdRead(fd, iovs, iovs_len, nread, currentInstance.exports.memory);
          },
          proc_exit: function(code) {
            throw new WasiExit(code);
          },
          args_get: function(argv, buf) {
            return 0;
          },
          args_sizes_get: function(argc, buf_size) {
            var dv = new DataView(currentInstance.exports.memory.buffer);
            dv.setUint32(argc, 0, true);
            dv.setUint32(buf_size, 0, true);
            return 0;
          }
        }
      };

      return WebAssembly.compile(bytes).then(function(mod) {
        compilerModule = {
          module: mod,
          createInstance: function() {
            var inst = new WebAssembly.Instance(mod, wasmImports);
            currentInstance = inst;
            return inst;
          }
        };
        compilerReady = true;
        var verStr = '';
        try {
          var probe = new WebAssembly.Instance(mod, wasmImports);
          var ver = probe.exports.__version;
          if (ver !== undefined) {
            var v = (typeof ver.value === 'number') ? ver.value : ver;
            verStr = ' ' + ((v >> 8) & 0xff) + '.' + (v & 0xff);
          }
        } catch (e) { /* no version export */ }
        setStatus('Compiler ready');
        appendOutput('<span class="out-info">Compact Pascal' + verStr + '</span>\n');
      });
    })
    .catch(function(err) {
      compilerReady = false;
      setStatus('Compiler unavailable (snapshot not found)');
    });
}

function doCompile() {
  if (!compilerReady || !compilerModule) {
    appendOutput('<span class="out-error">Compiler not available</span>\n');
    setStatus('Compiler not available');
    return;
  }

  saveCurrentBuffer();
  var buf = findBuffer(activeTab);
  if (!buf) {
    appendOutput('<span class="out-error">No active buffer</span>\n');
    return;
  }

  setStatus('Compiling...');
  appendOutput('<span class="out-info">Compiling ' + buf.name + '...</span>\n');

  try {
    var inst = compilerModule.createInstance();

    WasiContext.reset();
    WasiContext.fdState[0].data = new TextEncoder().encode(buf.content);

    try {
      inst.exports._start();
    } catch (e) {
      if (!(e instanceof WasiExit)) throw e;
    }

    var stderr = new TextDecoder().decode(new Uint8Array(WasiContext.fdState[2].data));
    var wasmBytes = new Uint8Array(WasiContext.fdState[1].data);

    if (stderr) {
      appendOutput('<span class="out-error">' + htmlEscape(stderr) + '</span>\n');
      setStatus('Compilation failed');
      buf.compiled = null;
    } else if (wasmBytes.length === 0) {
      appendOutput('<span class="out-error">No output from compiler</span>\n');
      setStatus('Compilation failed');
      buf.compiled = null;
    } else {
      appendOutput('<span class="out-info">Compiled ' + wasmBytes.length + ' bytes</span>\n');
      setStatus('Compiled ' + wasmBytes.length + ' bytes');
      buf.compiled = wasmBytes;
    }
  } catch (e) {
    appendOutput('<span class="out-error">Compiler error: ' + htmlEscape(e.message) + '</span>\n');
    setStatus('Compilation failed');
    buf.compiled = null;
  }
}

function doRun() {
  if (runningWorker) {
    appendOutput('<span class="out-error">Program already running</span>\n');
    return;
  }

  saveCurrentBuffer();
  var buf = findBuffer(activeTab);
  if (!buf) {
    appendOutput('<span class="out-error">No active buffer</span>\n');
    return;
  }

  if (!buf.compiled) {
    doCompile();
    if (!buf.compiled) {
      appendOutput('<span class="out-error">Cannot run: compilation failed</span>\n');
      return;
    }
  }

  setStatus('Running...');
  appendOutput('<span class="out-info">>> Running...</span>\n');

  runningWorker = new Worker('run-worker.js');

  runningWorker.onmessage = function(ev) {
    var msg = ev.data;
    if (msg.type === 'stdout') {
      appendOutput('<span class="out-stdout">' + htmlEscape(msg.data) + '</span>');
    } else if (msg.type === 'stderr') {
      appendOutput('<span class="out-stderr">' + htmlEscape(msg.data) + '</span>');
    } else if (msg.type === 'exit') {
      appendOutput('<span class="out-info">>> Program exited with code ' + msg.code + '</span>\n');
      setStatus('Program completed');
      runningWorker = null;
      document.getElementById('runBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
    }
  };

  runningWorker.onerror = function(err) {
    appendOutput('<span class="out-error">Worker error: ' + htmlEscape(err.message) + '</span>\n');
    setStatus('Execution failed');
    runningWorker = null;
    document.getElementById('runBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
  };

  document.getElementById('runBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;

  runningWorker.postMessage({
    type: 'run',
    wasmBytes: buf.compiled
  });
}

function doStop() {
  if (!runningWorker) return;
  runningWorker.terminate();
  runningWorker = null;
  appendOutput('<span class="out-info">>> Program stopped</span>\n');
  setStatus('Program stopped');
  document.getElementById('runBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
}

// --- Output pane ---
function appendOutput(html) {
  var temp = document.createElement('div');
  temp.innerHTML = html;
  while (temp.firstChild) {
    output.appendChild(temp.firstChild);
  }
  output.scrollTop = output.scrollHeight;
}

function clearOutput() {
  output.textContent = '';
}

// --- Utilities ---
function htmlEscape(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function setStatus(msg) {
  document.getElementById('statusLeft').textContent = msg;
}

// --- Auto-save on page unload ---
window.addEventListener('beforeunload', function() {
  doSave();
});

// --- Navigation guard ---
function confirmLeave() {
  doSave();
  return true;
}

// --- Dark mode ---
function toggleDarkMode() {
  var isDark = document.body.classList.toggle('dark');
  localStorage.setItem('cpas-dark-mode', isDark ? '1' : '0');
  document.getElementById('darkModeBtn').textContent = isDark ? '\u2600\uFE0F Light' : '\uD83C\uDF19 Dark';
}

(function restoreDarkMode() {
  if (localStorage.getItem('cpas-dark-mode') === '1') {
    document.body.classList.add('dark');
    document.getElementById('darkModeBtn').textContent = '\u2600\uFE0F Light';
  }
})();
</script>
</body>
</html>
