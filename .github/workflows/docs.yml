name: Build and Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'PLAN.md'
      - 'doc/**'
      - 'pages/**'
      - 'compiler/**'
      - '.github/workflows/docs.yml'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc and fonts
        run: sudo apt-get update && sudo apt-get install -y pandoc fonts-texgyre

      - name: Install Typst
        run: |
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz \
            | tar -xJ --strip-components=1 -C /usr/local/bin/

      - name: Build PDFs and HTML
        run: make pdf html

      - name: Deploy playground assets
        run: make deploy-playground

      - name: Assemble site
        run: |
          mkdir -p _site
          cp pages/index.html _site/
          cp pages/article.css _site/
          cp -r pages/logo _site/
          cp build/compact-pascal-wp.pdf _site/
          cp build/compact-pascal-ref.pdf _site/
          cp build/compact-pascal-tutorial.pdf _site/
          cp pages/compact-pascal-wp.html _site/
          cp pages/compact-pascal-ref.html _site/
          cp pages/compact-pascal-tutorial.html _site/
          cp doc/compact-pascal-wp.md _site/
          cp doc/compact-pascal-ref.md _site/
          cp doc/compact-pascal-tutorial.md _site/
          # Playground
          cp -r pages/playground _site/
          # Technical Notes (wildcard picks up all current and future TNs)
          cp build/compact-pascal-tn*.pdf _site/ 2>/dev/null || true
          cp pages/compact-pascal-tn*.html _site/ 2>/dev/null || true
          cp doc/compact-pascal-tn*.md _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
