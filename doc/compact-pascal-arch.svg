<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'TeX Gyre Heros', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <style>
      .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
      .inner { fill: #f5f5f0; stroke: #666; stroke-width: 1; }
      .label { font-weight: bold; fill: #333; }
      .sublabel { fill: #555; font-size: 11; }
      .arrow { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- Host Application -->
  <rect class="box" x="10" y="10" width="500" height="50" rx="4"/>
  <text class="label" x="260" y="40" text-anchor="middle">Host Application</text>
  <text class="sublabel" x="260" y="54" text-anchor="middle">(Rust / Zig / Browser JS)</text>

  <!-- Embedding Library -->
  <rect class="box" x="10" y="76" width="500" height="100" rx="4"/>
  <text class="label" x="260" y="96" text-anchor="middle">Embedding Library (compact-pascal crate / module)</text>

  <!-- WASM Runtime sub-box -->
  <rect class="inner" x="30" y="106" width="220" height="56" rx="3"/>
  <text class="label" x="140" y="128" text-anchor="middle">WASM Runtime</text>
  <text class="sublabel" x="140" y="148" text-anchor="middle">(wasmi / wasm3)</text>

  <!-- Host-Guest FFI sub-box -->
  <rect class="inner" x="270" y="106" width="220" height="56" rx="3"/>
  <text class="label" x="380" y="128" text-anchor="middle">Host–Guest FFI</text>
  <text class="sublabel" x="380" y="148" text-anchor="middle">(imports / exports)</text>

  <!-- Compiler -->
  <rect class="box" x="10" y="192" width="500" height="56" rx="4"/>
  <text class="label" x="260" y="214" text-anchor="middle">Compiler (WASM blob, written in Pascal)</text>
  <text class="sublabel" x="260" y="232" text-anchor="middle">source → fd 0 → compiler → fd 1 → .wasm</text>

  <!-- Compiled Program -->
  <rect class="box" x="10" y="264" width="500" height="56" rx="4"/>
  <text class="label" x="260" y="286" text-anchor="middle">Compiled Program (WASM module)</text>
  <text class="sublabel" x="260" y="304" text-anchor="middle">executed by the same WASM runtime</text>
</svg>
